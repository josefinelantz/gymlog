<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GymLog</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root{--bg:#0f1115;--card:#151823;--muted:#8a90a0;--fg:#e8eaf0;--acc:#7dd3fc;--good:#34d399;--warn:#fbbf24;--danger:#f87171}
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--fg);font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
    .wrap{max-width:840px;margin:0 auto;padding:12px 12px 48px}
    header{position:sticky;top:0;background:linear-gradient(180deg,var(--bg),rgba(15,17,21,.7));backdrop-filter:blur(6px);z-index:10}
    h1{font-size:22px;margin:12px 0 8px;display:flex;gap:10px;align-items:center}
    nav{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 12px}
    button,select,input,textarea{border-radius:12px;border:1px solid #2a2f3a;background:#0f131a;color:var(--fg);padding:10px 12px}
    button{cursor:pointer}
    .tab{padding:8px 12px;background:#121622;border:1px solid #22283a;color:var(--muted)}
    .tab.active{color:#0b1220;background:var(--acc);border-color:#4fbdf2;font-weight:600}
    .card{background:var(--card);border:1px solid #242a3a;border-radius:16px;padding:14px;margin:10px 0}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .grow{flex:1 1 120px}
    .muted{color:var(--muted)}
    .sm{font-size:12px}
    .pill{font-size:12px;padding:4px 8px;border-radius:999px;background:#0e1422;border:1px solid #253047;color:var(--muted)}
    .list{display:grid;gap:8px}
    .list .item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#0f131c;border:1px solid #1f2535;border-radius:12px}
    .item b{font-size:15px}
    .right{display:flex;gap:8px;align-items:center}
    .ok{background:#0f1713;border-color:#1f2e25;color:#86efac}
    .warn{background:#17130f;border-color:#2e261f;color:#fde68a}
    .del{background:#1a0f12;border-color:#3a1f25;color:#fca5a5}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
    .section-title{display:flex;justify-content:space-between;align-items:center;margin:12px 4px 6px}
    .tag{padding:2px 8px;border-radius:999px;border:1px solid #2d3a56;color:#9fb3d4;background:#0b1220;font-size:12px}
    .center{display:flex;justify-content:center;align-items:center}
  </style>
</head>
<body>
  <header class="wrap">
    <h1>🏋️‍♀️ GymLog <span class="pill" id="today"></span></h1>
    <nav id="tabs"></nav>
  </header>

  <main class="wrap">
    <section id="view-log" class="view"></section>
    <section id="view-exercises" class="view" hidden></section>
    <section id="view-history" class="view" hidden></section>
    <section id="view-stats" class="view" hidden></section>
    <section id="view-settings" class="view" hidden></section>
  </main>

<script>
// --- Safe boot & polyfills ---------------------------------------------------
(function(){
  // Visuell banner om lagring blockeras
  const bootMsg = document.createElement('div');
  bootMsg.id = 'bootmsg';
  bootMsg.style.cssText = 'position:fixed;left:12px;right:12px;bottom:12px;padding:10px 12px;border-radius:12px;background:#1f2937;color:#e5e7eb;border:1px solid #374151;z-index:99;display:none';
  bootMsg.textContent = 'Lagring blockerad – appen kör i minne. Öppna i Safari (ej Privat) eller lägg till på hemskärmen.';
  document.addEventListener('DOMContentLoaded',()=>document.body.appendChild(bootMsg));

  // crypto.randomUUID polyfill
  try{
    if(!(window.crypto && window.crypto.randomUUID)){
      window.crypto = window.crypto || {};
      window.crypto.randomUUID = function(){
        return 'id-' + Math.random().toString(36).slice(2) + '-' + Date.now();
      };
    }
  }catch(e){ /* ignore */ }

  // Testa localStorage; om blockerat -> in-memory fallback
  try{
    const k='__gl_test__'+Date.now();
    localStorage.setItem(k,'1'); localStorage.removeItem(k);
    window.__GL_STORAGE_MODE__ = 'localStorage';
  }catch(e){
    window.__GL_MEM__ = {};
    window.localStorage = {
      getItem:(k)=> Object.prototype.hasOwnProperty.call(window.__GL_MEM__,k)? window.__GL_MEM__[k] : null,
      setItem:(k,v)=>{ window.__GL_MEM__[k]=String(v) },
      removeItem:(k)=>{ delete window.__GL_MEM__[k] }
    };
    window.__GL_STORAGE_MODE__ = 'memory';
    setTimeout(()=>{ const el = document.getElementById('bootmsg'); if(el) el.style.display='block'; }, 300);
  }
})();

// --- Storage helpers ---------------------------------------------------------
const db = {
  load(){
    const raw = localStorage.getItem('gymlog_v1');
    if(!raw){
      const init = {
        exercises: ['Knäböj','Bänkpress','Marklyft','Hantelrodd','Hantelpress','Rygglyft','Roddmaskin','Latsdrag','Situps'],
        sessions: [],
        fav: {},
        presets: {}
      };
      localStorage.setItem('gymlog_v1', JSON.stringify(init));
      return init;
    }
    try { return JSON.parse(raw); } catch { return {exercises:[],sessions:[],fav:{},presets:{}} }
  },
  save(data){ localStorage.setItem('gymlog_v1', JSON.stringify(data)); }
};
let state = db.load();
state.fav = state.fav || {};
state.presets = state.presets || {};
db.save(state);

// --- Utils -------------------------------------------------------------------
const $ = sel => document.querySelector(sel);
const el = (tag, props={}, children=[])=>{
  // Safari-säker elementbuilder (sätter attribute om property är readonly)
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(props)) {
    if (k in e) { try { e[k] = v; } catch { e.setAttribute(k, v); } }
    else { e.setAttribute(k, v); }
  }
  for (const c of children) e.append(c instanceof Node ? c : document.createTextNode(c));
  return e;
};
const fmtDate = ts => new Date(ts).toLocaleString([], {dateStyle:'medium', timeStyle:'short'});
const fmtDay = ts => new Date(ts).toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
const sum = arr => arr.reduce((a,b)=>a+b,0);

// --- Tabs --------------------------------------------------------------------
const routes = [
  {id:'log', name:'Logga pass'},
  {id:'exercises', name:'Övningar'},
  {id:'history', name:'Historik'},
  {id:'stats', name:'Statistik'},
  {id:'settings', name:'Inställningar'},
];
const tabs = $('#tabs');
routes.forEach((r,i)=>{
  const b = el('button',{className:'tab' + (i===0?' active':''), onclick:()=>show(r.id)},[r.name]);
  b.dataset.route=r.id; tabs.append(b);
});
function show(id){
  document.querySelectorAll('.tab').forEach(t=> t.classList.toggle('active', t.dataset.route===id));
  document.querySelectorAll('.view').forEach(v=> v.hidden=true);
  $('#view-'+id).hidden=false;
  render[id]();
}
$('#today').textContent = new Date().toLocaleDateString([], {weekday:'long', year:'numeric', month:'short', day:'numeric'});

// --- Session state -----------------------------------------------------------
let liveSession = null; // { start, notes:[{ exercise, sets:[{ w, r, note, t }], started }] }

function startSession() {
  try {
    if (liveSession) { notify('Pass redan startat.'); render.log(); return; }
    liveSession = { start: Date.now(), notes: [] };
    notify('Pass startat.');
    show('log'); render.log();
  } catch (e) {
    console.error(e);
    alert('Kunde inte starta passet: ' + e);
  }
}

function endSession(){
  if(!liveSession) return;
  const durationMin = Math.round((Date.now()-liveSession.start)/60000);
  const session = { id: crypto.randomUUID(), start: liveSession.start, end: Date.now(), durationMin, notes: liveSession.notes };
  state.sessions.unshift(session);
  db.save(state);
  liveSession = null;
  notify('Pass sparat ('+durationMin+' min).');
  render.history();
  show('history');
}

// --- Render functions --------------------------------------------------------
const render = {
  log(){
    const root = $('#view-log'); root.innerHTML='';
    if(!liveSession){
      root.append(el('div',{className:'card center'},[
        el('div',{},[
          el('h3',{},['Redo att träna?']),
          el('p',{className:'muted'},['Starta ett pass för att logga set.']),
          el('div',{},[el('button',{className:'ok',onclick:()=>startSession()},['Starta pass'])])
        ])
      ]));
      return;
    }

    // Add exercise selector as cards
    const addCard = el('div',{className:'card'},[
      el('div',{className:'section-title'},[
        el('strong',{},['Välj övning']),
        el('span',{className:'muted sm'},['Tryck på ett kort eller skriv ny'])
      ]),
      (function(){
        // fritext för ny övning
        const inp = el('input',{className:'grow', placeholder:'…eller skriv ny övning'});
        const addBtn = el('button',{onclick:()=>{
          const name = inp.value.trim(); if(!name) return;
          if(!state.exercises.includes(name)) state.exercises.push(name);
          if(!liveSession.notes.find(n=> n.exercise===name)) liveSession.notes.push({exercise:name, sets:[], started: Date.now()});
          db.save(state); inp.value=''; render.log();
        }},['Lägg till']);
        const top = el('div',{className:'row'},[inp, addBtn]);

        // grid med kort (favoriter först)
        const grid = el('div',{className:'grid'});
        const ex = [...state.exercises].sort((a,b)=>{
          const fa = state.fav[a]?1:0, fb = state.fav[b]?1:0;
          if(fa!==fb) return fb-fa;
          return a.localeCompare(b,'sv');
        });
        ex.forEach(name=>{
          const isFav = !!state.fav[name];
          const card = el('div',{className:'list item', style:'gap:8px;'},[
            el('div',{},[
              el('b',{},[name]),
              state.presets[name]
                ? el('div',{className:'sm muted'},[`Preset: ${state.presets[name].sets} × ${state.presets[name].r} @ ${state.presets[name].w}kg`])
                : el('div',{className:'sm muted'},[''])
            ]),
            el('div',{className:'right'},[
              el('button',{className:'ok sm',onclick:()=>{
                if(!liveSession.notes.find(n=> n.exercise===name)) {
                  liveSession.notes.push({exercise:name, sets:[], started: Date.now()});
                }
                render.log();
              }},['Välj']),
              el('button',{className:'sm',onclick:()=>{
                state.fav[name] = !isFav; db.save(state); render.log();
              }},[isFav ? '★' : '☆'])
            ])
          ]);
          grid.append(card);
        });
        const wrap = el('div',{}); wrap.append(top, grid); return wrap;
      })()
    ]);
    root.append(addCard);

    if(liveSession.notes.length===0){
      root.append(el('p',{className:'muted'},['Inga övningar ännu.']));
    }

    // Övningskort
    liveSession.notes.forEach((n)=>{
      const card = el('div',{className:'card'},[]);
      card.append(el('div',{className:'section-title'},[
        el('strong',{},[n.exercise]),
        el('span',{className:'tag'},[n.sets.length+ ' set'])
      ]));

      // Form för ett enskilt set
      const w = el('input',{type:'number', inputmode:'decimal', step:'0.5', placeholder:'Vikt (kg)', className:'grow'});
      const r = el('input',{type:'number', inputmode:'numeric', step:'1', placeholder:'Reps', className:'grow'});
      const note = el('input',{type:'text', placeholder:'Kommentar (valfri)', className:'grow'});
      const addSet = el('button',{className:'ok', onclick:()=>{
        const weight = parseFloat(w.value); const reps = parseInt(r.value,10);
        if(isNaN(weight)||isNaN(reps)) { notify('Ange både vikt och reps.', 'warn'); return; }
        n.sets.push({w:weight, r:reps, note: note.value.trim()||'', t: Date.now()});
        w.value=''; r.value=''; note.value=''; render.log();
      }},['Lägg set']);
      card.append(el('div',{className:'row'},[w,r,note,addSet]));

      // Quick sets (batch + preset + upprepa)
      const qs = (function(){
        const count = el('input',{type:'number',step:'1',placeholder:'Antal set',className:'grow'});
        const wq = el('input',{type:'number',step:'0.5',placeholder:'Vikt (kg)',className:'grow'});
        const rq = el('input',{type:'number',step:'1',placeholder:'Reps',className:'grow'});

        const addBatch = el('button',{onclick:()=>{
          const c = parseInt(count.value||'0',10);
          const W = parseFloat(wq.value), R = parseInt(rq.value||'0',10);
          if(!c || isNaN(W) || isNaN(R)) { notify('Fyll i antal set, vikt och reps', 'warn'); return; }
          for(let i=0;i<c;i++){ n.sets.push({w:W,r:R,note:'',t: Date.now()}); }
          count.value=''; wq.value=''; rq.value=''; render.log();
        }},['Lägg N set']);

        const lastBtn = el('button',{onclick:()=>{
          const last = n.sets[n.sets.length-1];
          if(!last){ notify('Inga set ännu att upprepa','warn'); return; }
          n.sets.push({w:last.w, r:last.r, note:last.note||'', t:Date.now()}); render.log();
        }},['Upprepa senaste']);

        const applyPreset = el('button',{onclick:()=>{
          const p = state.presets[n.exercise];
          if(!p){ notify('Ingen preset sparad för denna övning','warn'); return; }
          for(let i=0;i<p.sets;i++){ n.sets.push({w:parseFloat(p.w)||0, r:parseInt(p.r,10)||0, note:'', t:Date.now()}); }
          render.log();
        }},['Använd preset']);

        const savePreset = el('button',{onclick:()=>{
          const c = parseInt(count.value||'3',10);
          const W = wq.value? parseFloat(wq.value): 0;
          const R = rq.value? parseInt(rq.value,10): 10;
          state.presets[n.exercise] = {sets:c,w:W,r:R};
          db.save(state); notify('Preset sparad'); render.log();
        }},['Spara som preset']);

        const row1 = el('div',{className:'row'},[count,wq,rq,addBatch]);
        const row2 = el('div',{className:'row'},[lastBtn,applyPreset,savePreset]);
        return el('div',{},[
          el('div',{className:'sm muted', style:'margin:6px 2px;'},['Snabbset: ange antal set + vikt + reps']),
          row1,row2
        ]);
      })();
      card.append(qs);

      // List set
      if(n.sets.length){
        const list = el('div',{className:'list'});
        n.sets.forEach((s,i)=>{
          list.append(el('div',{className:'item'},[
            el('div',{},[
              el('b',{},[s.w+' kg × '+s.r+' reps']),
              el('div',{className:'sm muted'},[fmtTimeAgo(s.t)+(s.note? ' · '+s.note:'')])
            ]),
            el('div',{className:'right'},[
              el('button',{className:'del', onclick:()=>{ n.sets.splice(i,1); render.log(); }},['Ta bort'])
            ])
          ]));
        });
        card.append(list);
      }

      root.append(card);
    });

    // Avsluta pass
    root.append(el('div',{className:'row'},[
      el('button',{className:'warn', onclick:endSession},['Avsluta & spara pass'])
    ]));
  },

  exercises(){
    const root = $('#view-exercises'); root.innerHTML='';
    root.append(el('div',{className:'card'},[
      el('div',{className:'section-title'},[
        el('strong',{},['Dina övningar']),
        el('span',{className:'muted sm'},[state.exercises.length+' st'])
      ]),
      (function(){
        const name = el('input',{placeholder:'Lägg till ny övning', className:'grow'});
        const add = el('button',{onclick:()=>{
          const v = name.value.trim(); if(!v) return;
          if(!state.exercises.includes(v)) { state.exercises.push(v); db.save(state); render.exercises(); }
          name.value='';
        }},['Lägg till']);
        return el('div',{className:'row'},[name,add]);
      })(),
    ]));

    const grid = el('div',{className:'grid'});
    state.exercises.forEach((x,i)=>{
      const isFav = !!state.fav[x];
      const item = el('div',{className:'card'},[
        el('div',{className:'section-title'},[
          el('b',{},[x]),
          el('div',{className:'right'},[
            el('button',{className:'sm',onclick:()=>{ state.fav[x]=!isFav; db.save(state); render.exercises(); }},[isFav?'★':'☆']),
            el('button',{className:'del sm', onclick:()=>{ if(confirm('Ta bort övning? (historik påverkas inte)')){ state.exercises.splice(i,1); delete state.fav[x]; delete state.presets[x]; db.save(state); render.exercises(); } }},['Ta bort'])
          ])
        ])
      ]);
      grid.append(item);
    });
    root.append(grid);
  },

  history(){
    const root = $('#view-history'); root.innerHTML='';
    if(state.sessions.length===0){ root.append(el('p',{className:'muted'},['Inga sparade pass ännu.'])); return; }
    state.sessions.forEach(s=>{
      const card = el('div',{className:'card'},[]);
      card.append(el('div',{className:'section-title'},[
        el('strong',{},[fmtDate(s.start)]),
        el('span',{className:'tag'},[s.durationMin+' min'])
      ]));
      s.notes.forEach(n=>{
        const totalReps = sum(n.sets.map(x=>x.r));
        const vol = sum(n.sets.map(x=>x.w * x.r));
        const exer = el('div',{className:'item'},[
          el('div',{},[
            el('b',{},[n.exercise+' · '+n.sets.length+' set']),
            el('div',{className:'sm muted'},['Reps: '+totalReps+' · Volym: '+vol.toFixed(0)+' kg'])
          ])
        ]);
        card.append(exer);
      });
      const bar = el('div',{className:'row'},[
        el('button',{onclick:()=>{ if(confirm('Radera pass?')){ state.sessions = state.sessions.filter(x=>x.id!==s.id); db.save(state); render.history(); } } , className:'del'},['Radera pass'])
      ]);
      card.append(bar);
      root.append(card);
    });
  },

  stats(){
    const root = $('#view-stats'); root.innerHTML='';
    const byEx = new Map();
    state.sessions.forEach(s=> s.notes.forEach(n=>{
      const o = byEx.get(n.exercise) || {sets:0,reps:0,vol:0,last:null};
      o.sets += n.sets.length; o.reps += sum(n.sets.map(x=>x.r)); o.vol += sum(n.sets.map(x=>x.w*x.r));
      if(!o.last || s.start>o.last) o.last=s.start; byEx.set(n.exercise,o);
    }));

    if(byEx.size===0){ root.append(el('p',{className:'muted'},['Ingen statistik ännu. Logga några pass först.'])); return; }

    const grid = el('div',{className:'grid'});
    Array.from(byEx.entries()).sort((a,b)=>b[1].vol-a[1].vol).forEach(([name, o])=>{
      grid.append(el('div',{className:'card'},[
        el('div',{className:'section-title'},[
          el('b',{},[name]),
          el('span',{className:'tag'},[o.sets+' set'])
        ]),
        el('div',{className:'muted sm'},['Total volym: '+o.vol.toFixed(0)+' kg · Reps: '+o.reps+' · Senast: '+fmtDay(o.last)])
      ]));
    });
    root.append(grid);
  },

  settings(){
    const root = $('#view-settings'); root.innerHTML='';
    const info = el('div',{className:'card'},[
      el('div',{className:'section-title'},[
        el('strong',{},['Lagring']),
        el('span',{className:'muted sm'},[ (window.__GL_STORAGE_MODE__ || 'okänt') ])
      ]),
      el('p',{className:'muted sm'},[
        'Om det står \"memory\": lägg till på hemskärmen och öppna därifrån eller använd Safari (inte Privat).'
      ])
    ]);
    root.append(info);

    root.append(el('div',{className:'card'},[
      el('div',{className:'section-title'},[
        el('strong',{},['Export / Import']),
        el('span',{className:'muted sm'},['Säkerhetskopia lokalt'])
      ]),
      el('div',{className:'row'},[
        el('button',{onclick:()=>{
          const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
          const a = el('a',{href:URL.createObjectURL(blob), download:'gymlog-export.json'});
          a.click();
        }},['Exportera JSON']),
        (function(){
          const input = el('input',{type:'file',accept:'application/json'});
          input.onchange = async ()=>{ const f = input.files[0]; if(!f) return; const txt = await f.text(); try{ const data = JSON.parse(txt); if(!data.sessions||!data.exercises) throw 0; state=data; db.save(state); notify('Importerat.'); render.history(); }catch{ notify('Ogiltig fil.','warn'); }
          };
          const btn = el('button',{onclick:()=> input.click()},['Importera JSON']);
          return el('div',{className:'row'},[btn,input]);
        })()
      ])
    ]));

    root.append(el('div',{className:'card'},[
      el('div',{className:'section-title'},[
        el('strong',{},['Rensa allt']),
        el('span',{className:'muted sm'},['Tar bort övningar & historik'])
      ]),
      el('button',{className:'del', onclick:()=>{ if(confirm('Vill du radera ALL data?')){ localStorage.removeItem('gymlog_v1'); state=db.load(); liveSession=null; render.log(); notify('Återställt.'); } }},['Rensa data'])
    ]));
  }
};

function notify(msg, kind='ok'){
  const n = el('div',{className:'card '+(kind==='warn'?'warn':kind==='ok'?'ok':'')},[msg]);
  n.style.position='fixed'; n.style.bottom='12px'; n.style.left='12px'; n.style.right='12px'; n.style.zIndex=50;
  document.body.append(n); setTimeout(()=> n.remove(), 2200);
}
function fmtTimeAgo(ts){
  const s = Math.round((Date.now()-ts)/1000);
  if(s<60) return s+'s sedan';
  const m = Math.round(s/60); if(m<60) return m+'m sedan';
  const h = Math.round(m/60); return h+'h sedan';
}

// initial render (med felvakt)
try{ show('log'); }catch(e){ console.error(e); const el = document.getElementById('bootmsg'); if(el) el.style.display='block'; }
</script>
</body>
</html>
